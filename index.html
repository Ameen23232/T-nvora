<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tènvora Group | حيث تولد الامتيازات الرقمية</title>
    
    <!-- Firebase SDK للتتبع -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-high);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; 
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: background-color 0.8s var(--ease-long), color 0.6s var(--ease-long);
            font-weight: 600; 
        }

        :root {
            --primary: #78a0ff; 
            --primary-glow: rgba(120, 160, 255, 0.4); 
            --bg-deep: #05070a; 
            --text-high: #f8fafc; 
            --text-mid: #94a3b8; 
            --accent: #c084fc;
            --menu-bg: rgba(10, 10, 10, 0.6);
            --mesh-gradient: radial-gradient(circle at 50% 50%, #0f172a 0%, #05070a 100%);
            --glass-base: rgba(255, 255, 255, 0.03);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --glass-border-dark: rgba(255, 255, 255, 0.02);
            --glass-shadow-color: rgba(0, 0, 0, 0.4);
            --glass-bg: linear-gradient(135deg, var(--glass-base) 0%, rgba(255, 255, 255, 0) 100%);
            --neon-glow-subtle: 0 0 4px var(--primary-glow), 0 0 2px var(--primary);
            --neon-glow-hover: 0 0 0 2px var(--primary), 0 0 16px var(--primary), 0 0 28px var(--primary-glow);
            --neon-glow-card: 0 0 0 1px rgba(255,255,255,0.05), 0 0 8px var(--primary-glow);
            --neon-glow-card-hover: 0 0 0 2px var(--primary), 0 0 18px var(--primary), 0 0 32px var(--primary-glow);
            --ease-long: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --card-radius: 40px;
            --section-padding: 120px;
        }

        html { overflow-x: hidden; width: 100%; scroll-behavior: smooth; }

        body.mode-1 { 
            --bg-deep: #f0f4f8; --text-high: #1e293b; --text-mid: #475569; --primary: #2563eb; 
            --mesh-gradient: radial-gradient(circle, #e2e8f0 0%, #f0f4f8 100%); 
            --menu-bg: rgba(255,255,255,0.6); --primary-glow: rgba(37,99,235,0.3); 
            --glass-base: rgba(0, 0, 0, 0.03);
            --glass-highlight: rgba(0, 0, 0, 0.1);
            --glass-border-dark: rgba(0, 0, 0, 0.02);
            --glass-shadow-color: rgba(0, 0, 0, 0.05);
        }
        body.mode-2 { --primary: #ff9800; --bg-deep: #211a2d; --text-high: #fff1e1; --text-mid: #d1b8c1; --mesh-gradient: linear-gradient(135deg, #2d1b2d 0%, #211a2d 100%); --primary-glow: rgba(255,152,0,0.4); }
        body.mode-3 { --primary: #00e5ff; --bg-deep: #0a0e1a; --text-high: #e0f2f1; --text-mid: #90a4ae; --mesh-gradient: radial-gradient(circle, #0f1c3a 0%, #0a0e1a 100%); --primary-glow: rgba(0,229,255,0.4); }
        body.mode-4 { --primary: #4caf50; --bg-deep: #0a110a; --text-high: #f1f8e9; --text-mid: #78909c; --mesh-gradient: linear-gradient(135deg, #101910 0%, #0a110a 100%); --primary-glow: rgba(76,175,80,0.4); }
        body.mode-5 { --primary: #a855f7; --bg-deep: #0f071a; --text-high: #faf5ff; --text-mid: #d8b4fe; --mesh-gradient: radial-gradient(circle, #2e1065 0%, #0f071a 100%); --primary-glow: rgba(168,85,247,0.4); }
        body.mode-6 { --primary: #fda4af; --bg-deep: #1e1b1e; --text-high: #fff1f2; --text-mid: #f43f5e; --mesh-gradient: radial-gradient(circle, #3d2b2d 0%, #1e1b1e 100%); --primary-glow: rgba(253,164,175,0.4); }
        body.mode-7 { --primary: #f59e0b; --bg-deep: #1c1917; --text-high: #fffbeb; --text-mid: #d97706; --mesh-gradient: linear-gradient(to bottom, #451a03, #1c1917); --primary-glow: rgba(245,158,11,0.4); }
        body.mode-8 { --primary: #2dd4bf; --bg-deep: #021a1a; --text-high: #f0fdfa; --text-mid: #5eead4; --mesh-gradient: radial-gradient(circle, #042f2e 0%, #021a1a 100%); --primary-glow: rgba(45,212,191,0.4); }
        body.mode-9 { --primary: #94a3b8; --bg-deep: #0f172a; --text-high: #f1f5f9; --text-mid: #64748b; --mesh-gradient: radial-gradient(circle, #1e293b 0%, #0f172a 100%); --primary-glow: rgba(148,163,184,0.4); }

        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: all 0.8s var(--ease-long);
            will-change: transform, opacity;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        section p, section h2, section h1, .nav-logo, .card h3, .work-item, footer {
            transition: text-shadow 0.3s var(--ease-long), color 0.3s var(--ease-long), transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: default;
            text-shadow: 0 0 6px var(--primary-glow);
        }
        
        section p:hover, section h2:hover, section h1:hover, .card h3:hover {
            transform: scale(1.02);
            text-shadow: 0 0 12px var(--primary), 0 0 22px var(--primary-glow);
            color: var(--primary);
        }

        .logo-glow {
            font-size: clamp(50px, 15vw, 150px);
            font-weight: 950;
            background: linear-gradient(180deg, var(--text-high), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px var(--primary-glow));
            animation: float 5s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 8px var(--primary-glow)); }
            50% { transform: translateY(-12px); filter: drop-shadow(0 12px 20px var(--primary-glow)); }
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--mesh-gradient);
            transition: background 1s var(--ease-long);
        }

        .theme-control {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2001;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            width: 50px;
            height: 50px;
            backdrop-filter: blur(16px);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--glass-shadow-color), var(--neon-glow-subtle);
            transition: transform 0.25s var(--ease-long), box-shadow 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05) rotate(5deg);
            border-color: var(--primary);
            box-shadow: 0 6px 18px var(--glass-shadow-color), var(--neon-glow-hover);
        }

        .theme-dropdown {
            background: var(--menu-bg);
            border: 1px solid var(--glass-border-dark);
            border-radius: 20px;
            backdrop-filter: blur(24px);
            position: absolute;
            top: 65px;
            left: 0;
            width: 250px;
            box-shadow: 0 8px 32px 0 var(--glass-shadow-color);
            overflow-y: auto;
            max-height: 0;
            opacity: 0;
            transform: translateY(-20px);
            transition: 0.4s var(--ease-long);
            visibility: hidden;
        }

        .theme-control.active .theme-dropdown {
            max-height: 450px;
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .dropdown-item {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-mid);
            text-decoration: none;
            border-bottom: 1px solid var(--glass-border-dark);
            transition: all 0.25s var(--ease-long);
            font-weight: 700;
        }

        .dropdown-item:hover { 
            background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); 
            color: var(--text-high); 
            padding-right: 25px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(180deg, var(--menu-bg) 0%, transparent 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-highlight);
        }

        .nav-logo {
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        main {
            width: 100%;
            max-width: 1200px;
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px;
        }

        section {
            padding: var(--section-padding) 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-desc {
            font-size: clamp(18px, 4vw, 24px);
            max-width: 800px;
            margin-bottom: 40px;
            color: var(--text-mid);
            font-weight: 700;
        }

        .img-container {
            width: 100%;
            max-width: 900px;
            margin: 40px 0;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: 0 12px 28px var(--glass-shadow-color), var(--neon-glow-subtle);
            transition: transform 0.5s var(--ease-long), box-shadow 0.4s ease;
        }

        .img-container:hover {
            transform: scale(1.02) translateY(-6px);
            box-shadow: 0 20px 40px var(--glass-shadow-color), var(--neon-glow-hover);
            border-color: var(--primary);
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            margin: 40px 0;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            padding: 40px 30px;
            border-radius: var(--card-radius);
            backdrop-filter: blur(16px);
            transition: transform 0.4s var(--ease-long), box-shadow 0.35s ease;
            box-shadow: 0 6px 18px var(--glass-shadow-color), var(--neon-glow-card);
            text-align: right;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 16px 32px var(--glass-shadow-color), var(--neon-glow-card-hover);
        }

        .card h3 {
            color: var(--primary);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .card p {
            color: var(--text-mid);
            font-size: 16px;
            font-weight: 600;
        }

        .highlight-text {
            font-size: clamp(22px, 5vw, 42px);
            font-weight: 900;
            color: var(--text-high);
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .btn-neon {
            padding: 20px 50px;
            border-radius: 100px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: var(--text-high);
            text-decoration: none;
            font-weight: 900;
            font-size: 18px;
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            box-shadow: 0 6px 14px var(--glass-shadow-color), var(--neon-glow-subtle);
            transition: transform 0.3s var(--ease-long), box-shadow 0.3s ease;
            margin-top: 30px;
            cursor: pointer;
            width: fit-content;
            position: relative;
            overflow: hidden;
        }

        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-neon:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 8px 22px var(--glass-shadow-color), var(--neon-glow-hover);
            transform: translateY(-4px);
        }

        .btn-neon:hover::before {
            left: 150%;
            transition: 0.6s;
        }

        .social-dock {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .social-dock a {
            width: 60px;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            box-shadow: 0 6px 14px var(--glass-shadow-color), var(--neon-glow-subtle);
            transition: transform 0.25s var(--ease-long), box-shadow 0.3s ease;
        }

        .social-dock a:hover { 
            transform: scale(1.12) translateY(-6px) rotate(4deg); 
            border-color: var(--primary); 
            box-shadow: 0 10px 20px var(--glass-shadow-color), var(--neon-glow-hover);
        }

        .social-dock img { width: 30px; height: 30px; }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            border: 1px solid rgba(255,255,255,0.3);
            border-top: 1px solid rgba(255,255,255,0.6);
            border-left: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 6px 18px rgba(37, 211, 102, 0.3);
            transition: transform 0.3s var(--ease-long), box-shadow 0.3s ease;
        }
        
        .whatsapp-float:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 14px 28px rgba(37, 211, 102, 0.5), 0 0 0 2px #25d366, 0 0 20px #25d366;
        }

        .modal-box {
            width: 95%;
            max-width: 900px;
            background: var(--menu-bg);
            backdrop-filter: blur(25px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--primary);
            border-left: 1px solid var(--glass-highlight);
            text-align: right;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px var(--glass-shadow-color), 0 0 0 1px var(--primary-glow);
        }

        .work-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .work-item {
            padding: 20px;
            background: var(--glass-bg);
            border-radius: 15px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-high);
            border: 1px solid var(--glass-border-dark);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            box-shadow: 0 4px 12px var(--glass-shadow-color), var(--neon-glow-subtle);
            transition: transform 0.25s var(--ease-long), box-shadow 0.3s;
            display: inline-block;
        }
        .work-item:hover { 
            border-color: var(--primary); 
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
            transform: scale(1.04) translateY(-4px); 
            box-shadow: 0 8px 20px var(--glass-shadow-color), var(--neon-glow-hover);
            color: var(--primary);
        }

        footer { padding: 40px; opacity: 0.6; font-size: 13px; font-weight: 800; }

        @media (max-width: 600px) {
            section { padding: 60px 10px; }
            .btn-neon { width: 100%; text-align: center; }
            .card { padding: 25px 20px; }
        }
    </style>
</head>
